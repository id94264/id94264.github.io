<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>全屏时钟</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dseg@0.46.0/css/dseg.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #000000 0%, #000000 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: background 0.2s ease;
        }

        :root {
            --time-color: #ffffff;
            --date-color: #ffffff;
            --time-weight: 300;
            --date-weight: 300;
            --time-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --date-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .clock-container {
            text-align: center;
            color: white;
            padding: 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* --- 修复：时间居中且不抖动 --- */
        .time {
            display: grid;
            /* 使用 min-content 确保容器宽度随文字大小自适应 */
            width: max-content; 
            /* 8个槽位：数字x2, 冒号, 数字x2, 冒号, 数字x2 */
            /* 使用 ch 单位确保每个槽位宽度一致（等宽化处理） */
            grid-template-columns: 1ch 1ch 0.5ch 1ch 1ch 0.5ch 1ch 1ch;
            justify-content: center; /* 水平居中所有网格列 */
            justify-items: center;
            align-items: center;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            line-height: 1.2;
            white-space: nowrap;
            color: var(--time-color);
            font-weight: var(--time-weight);
            font-family: var(--time-family);
            transition: color 0.2s, font-family 0.2s;
        }

        /* 保证每个数字在自己的格子内居中 */
        .time span {
            display: inline-block;
            text-align: center;
        }
        /* -------------------------- */

        .date {
            margin-bottom: 30px;
            opacity: 0.9;
            white-space: nowrap;
            color: var(--date-color);
            font-weight: var(--date-weight);
            font-family: var(--date-family);
            transition: color 0.2s, font-family 0.2s;
            max-width: 90vw;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        .btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .settings-panel {
            position: fixed;
            top: 0;
            right: -350px;
            width: 320px;
            height: 100vh;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            transition: right 0.3s ease;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        .settings-panel.active { right: 0; }
        .settings-panel h3 { color: #333; margin-bottom: 20px; text-align: center; font-size: 1.5rem; }
        .setting-group { margin-bottom: 20px; padding: 15px; background: rgba(0,0,0,0.05); border-radius: 10px; }
        .setting-group h4 { color: #555; margin-bottom: 10px; font-size: 1.1rem; }
        .setting-item { margin-bottom: 12px; }
        .setting-item label { display: block; margin-bottom: 5px; color: #666; font-size: 0.9rem; }
        .setting-item input, .setting-item select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px; background: white; }
        .close-settings { position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #666; }
        .settings-actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .settings-actions .btn { flex: 1; padding: 12px; color: #333; background: rgba(0,0,0,0.08); border: 1px solid #ccc; width: auto; height: auto; font-size: 0.9rem; }

        @media (max-width: 768px) {
            .settings-panel { width: 100%; right: -100%; }
        }
    </style>
</head>
<body>
    <div class="clock-container">
        <div class="time" id="time"></div>
        <div class="date" id="date"></div>
    </div>
    
    <div class="controls">
        <button class="btn" id="fullscreenBtn" title="全屏">⛶</button>
        <button class="btn" id="settingsBtn" title="设置">⚙️</button>
    </div>

    <div class="settings-panel" id="settingsPanel">
        <button class="close-settings" id="closeSettings">&times;</button>
        <h3>时钟设置</h3>
        <div class="setting-group">
            <h4>⏰ 时间设置</h4>
            <div class="setting-item">
                <label>相对大小</label>
                <input type="number" id="timeFontSize" min="2" max="50" step="0.5" value="8">
            </div>
            <div class="setting-item">
                <label>字体颜色</label>
                <input type="color" id="timeColor" value="#ffffff">
            </div>
            <div class="setting-item">
                <label>字体粗细</label>
                <select id="timeFontWeight">
                    <option value="100">100</option><option value="200">200</option><option value="300" selected>300</option>
                    <option value="400">400</option><option value="500">500</option><option value="700">700</option>
                </select>
            </div>
            <div class="setting-item">
                <label>字体样式</label>
                <select id="timeFontFamily">
                    <option value="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">默认</option>
                    <option value="'DSEG7 Classic', monospace">数码管</option>
                    <option value="'Press Start 2P', cursive">像素</option>
                    <option value="'Orbitron', sans-serif">未来感</option>
                </select>
            </div>
        </div>

        <div class="setting-group">
            <h4>📅 日期设置</h4>
            <div class="setting-item">
                <label>相对大小</label>
                <input type="number" id="dateFontSize" min="1" max="30" step="0.5" value="2">
            </div>
            <div class="setting-item">
                <label>字体颜色</label>
                <input type="color" id="dateColor" value="#ffffff">
            </div>
            <div class="setting-item">
                <label>字体粗细</label>
                <select id="dateFontWeight">
                    <option value="100">100</option><option value="300" selected>300</option><option value="500">500</option>
                </select>
            </div>
            <div class="setting-item">
                <label>字体样式</label>
                <select id="dateFontFamily">
                    <option value="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">默认</option>
                    <option value="'Orbitron', sans-serif">未来感</option>
                </select>
            </div>
        </div>
        
        <div class="setting-group">
            <h4>🎨 背景设置</h4>
            <div class="setting-item">
                <label>背景色1</label><input type="color" id="bgColor1" value="#000000">
            </div>
            <div class="setting-item">
                <label>背景色2</label><input type="color" id="bgColor2" value="#000000">
            </div>
        </div>
        
        <div class="settings-actions">
            <button class="btn" id="resetSettings">恢复默认</button>
            <button class="btn" id="cancelSettings">取消</button>
            <button class="btn" id="saveSettings">保存设置</button>
        </div>
    </div>

    <script>
        const defaultSettings = {
            timeFontSize: 8, timeColor: '#ffffff', timeFontWeight: '300', timeFontFamily: "-apple-system, BlinkMacSystemFont, sans-serif",
            dateFontSize: 2, dateColor: '#ffffff', dateFontWeight: '300', dateFontFamily: "-apple-system, BlinkMacSystemFont, sans-serif",
            bgColor1: '#000000', bgColor2: '#000000'
        };

        let currentAppliedSettings = {...defaultSettings};
        let settingsAtOpen = {...defaultSettings};

        const timeEl = document.getElementById('time');
        const dateEl = document.getElementById('date');

        function updateFontSizeByWindow() {
            const winWidth = document.documentElement.clientWidth;
            const scale = winWidth / 1200;
            timeEl.style.fontSize = Math.max(20, currentAppliedSettings.timeFontSize * 16 * scale) + 'px';
            dateEl.style.fontSize = Math.max(12, currentAppliedSettings.dateFontSize * 16 * scale) + 'px';
        }

        function applySettings(settings) {
            document.documentElement.style.setProperty('--time-color', settings.timeColor);
            document.documentElement.style.setProperty('--date-color', settings.dateColor);
            document.documentElement.style.setProperty('--time-weight', settings.timeFontWeight);
            document.documentElement.style.setProperty('--date-weight', settings.dateFontWeight);
            document.documentElement.style.setProperty('--time-family', settings.timeFontFamily);
            document.documentElement.style.setProperty('--date-family', settings.dateFontFamily);
            document.body.style.background = `linear-gradient(135deg, ${settings.bgColor1}, ${settings.bgColor2})`;
            currentAppliedSettings = {...settings};
            updateFontSizeByWindow();
        }

        function previewSettings() {
            const settings = {
                timeFontSize: parseFloat(document.getElementById('timeFontSize').value),
                timeColor: document.getElementById('timeColor').value,
                timeFontWeight: document.getElementById('timeFontWeight').value,
                timeFontFamily: document.getElementById('timeFontFamily').value,
                dateFontSize: parseFloat(document.getElementById('dateFontSize').value),
                dateColor: document.getElementById('dateColor').value,
                dateFontWeight: document.getElementById('dateFontWeight').value,
                dateFontFamily: document.getElementById('dateFontFamily').value,
                bgColor1: document.getElementById('bgColor1').value,
                bgColor2: document.getElementById('bgColor2').value
            };
            applySettings(settings);
        }

        function updateTime() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            
            // 每一个字符包含冒号都用 span 包裹
            timeEl.innerHTML = `
                <span>${h[0]}</span><span>${h[1]}</span><span>:</span>
                <span>${m[0]}</span><span>${m[1]}</span><span>:</span>
                <span>${s[0]}</span><span>${s[1]}</span>
            `;
            
            const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            dateEl.textContent = `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日 ${weekdays[now.getDay()]}`;
        }

        // 事件绑定
        document.getElementById('settingsBtn').onclick = () => {
            settingsAtOpen = {...currentAppliedSettings};
            document.getElementById('settingsPanel').classList.add('active');
        };
        document.getElementById('closeSettings').onclick = () => {
            applySettings(settingsAtOpen);
            document.getElementById('settingsPanel').classList.remove('active');
        };
        document.getElementById('saveSettings').onclick = () => {
            previewSettings();
            localStorage.setItem('clockSettings', JSON.stringify(currentAppliedSettings));
            document.getElementById('settingsPanel').classList.remove('active');
        };
        document.getElementById('resetSettings').onclick = () => {
            applySettings(defaultSettings);
            localStorage.removeItem('clockSettings');
        };
        document.getElementById('cancelSettings').onclick = () => {
            applySettings(settingsAtOpen);
            document.getElementById('settingsPanel').classList.remove('active');
        };
        document.getElementById('fullscreenBtn').onclick = () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        };

        window.addEventListener('resize', updateFontSizeByWindow);
        window.addEventListener('load', () => {
            const saved = localStorage.getItem('clockSettings');
            if (saved) applySettings(JSON.parse(saved));
            else applySettings(defaultSettings);
            
            document.querySelectorAll('.setting-item input, .setting-item select').forEach(el => {
                el.addEventListener('input', previewSettings);
            });
        });

        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
